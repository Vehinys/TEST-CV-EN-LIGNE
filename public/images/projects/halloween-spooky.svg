<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0010"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Lune -->
  <circle cx="640" cy="100" r="70" fill="url(#moon)" opacity="0.15"/>
  <circle cx="640" cy="100" r="50" fill="#fbbf24" opacity="0.08"/>

  <!-- Étoiles -->
  <circle cx="100" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="80" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="30" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="500" cy="60" r="1" fill="white" opacity="0.6"/>
  <circle cx="720" cy="150" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="750" cy="50" r="1" fill="white" opacity="0.5"/>

  <!-- Citrouille centrale -->
  <ellipse cx="400" cy="220" rx="80" ry="70" fill="#ea580c" opacity="0.9"/>
  <ellipse cx="340" cy="225" rx="55" ry="65" fill="#c2410c" opacity="0.7"/>
  <ellipse cx="460" cy="225" rx="55" ry="65" fill="#c2410c" opacity="0.7"/>
  <!-- Tige -->
  <rect x="393" y="148" width="14" height="30" rx="7" fill="#16a34a"/>
  <!-- Visage de citrouille -->
  <polygon points="370,200 385,220 355,220" fill="#0d0010"/>
  <polygon points="415,200 430,220 400,220" fill="#0d0010"/>
  <path d="M355 250 Q400 280 445 250" stroke="#0d0010" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Titre landing page -->
  <text x="400" y="340" font-family="sans-serif" font-size="32" font-weight="900" fill="url(#orange)" text-anchor="middle">HALLOWEEN</text>
  <text x="400" y="370" font-family="sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="8">SPOOKY NIGHT</text>

  <!-- Compte à rebours simulé -->
  <rect x="200" y="385" width="80" height="48" rx="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="240" y="407" font-family="monospace" font-size="20" font-weight="700" fill="#fb923c" text-anchor="middle">12</text>
  <text x="240" y="423" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">JOURS</text>

  <rect x="295" y="385" width="80" height="48" rx="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="335" y="407" font-family="monospace" font-size="20" font-weight="700" fill="#fb923c" text-anchor="middle">08</text>
  <text x="335" y="423" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">HEURES</text>

  <rect x="390" y="385" width="80" height="48" rx="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="430" y="407" font-family="monospace" font-size="20" font-weight="700" fill="#fb923c" text-anchor="middle">45</text>
  <text x="430" y="423" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">MINUTES</text>

  <rect x="485" y="385" width="80" height="48" rx="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="525" y="407" font-family="monospace" font-size="20" font-weight="700" fill="#fb923c" text-anchor="middle">33</text>
  <text x="525" y="423" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">SECONDES</text>

  <!-- Label tags -->
  <text x="60" y="420" font-family="sans-serif" font-size="11" fill="rgba(249,115,22,0.7)">Event Design · Landing Page · Animation</text>
</svg>
