<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="100%" stop-color="#2d1200"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Texture bois simulée -->
  <rect x="0" y="0" width="800" height="450" fill="rgba(180,83,9,0.04)"/>

  <!-- Image hero restaurant (fenêtre simulée) -->
  <rect x="40" y="40" width="340" height="240" rx="12" fill="rgba(180,83,9,0.15)" stroke="rgba(180,83,9,0.3)" stroke-width="1"/>
  <!-- Table de restaurant simulée -->
  <ellipse cx="210" cy="200" rx="100" ry="40" fill="rgba(120,53,15,0.6)"/>
  <rect x="170" y="160" width="80" height="120" rx="4" fill="rgba(120,53,15,0.4)"/>
  <!-- Assiette -->
  <circle cx="210" cy="200" r="35" fill="rgba(254,243,199,0.15)" stroke="rgba(254,243,199,0.2)" stroke-width="1"/>
  <circle cx="210" cy="200" r="25" fill="rgba(180,83,9,0.3)"/>
  <!-- Bougie -->
  <rect x="205" y="140" width="10" height="30" rx="5" fill="rgba(254,243,199,0.4)"/>
  <ellipse cx="210" cy="138" rx="6" ry="4" fill="#fbbf24" opacity="0.8"/>
  <!-- Verre -->
  <path d="M245 175 L255 205 L235 205 Z" fill="rgba(147,197,253,0.3)" stroke="rgba(147,197,253,0.4)" stroke-width="1"/>

  <!-- Nom du restaurant -->
  <text x="40" y="310" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#fbbf24">Au Vieux Moulin</text>
  <text x="40" y="335" font-family="sans-serif" font-size="13" fill="rgba(251,191,36,0.6)" letter-spacing="3">RESTAURANT ALSACIEN</text>

  <!-- Séparateur décoratif -->
  <line x1="40" y1="350" x2="200" y2="350" stroke="rgba(180,83,9,0.5)" stroke-width="1"/>
  <circle cx="215" cy="350" r="4" fill="rgba(180,83,9,0.5)"/>
  <line x1="230" y1="350" x2="380" y2="350" stroke="rgba(180,83,9,0.5)" stroke-width="1"/>

  <!-- Bouton réservation -->
  <rect x="40" y="370" width="160" height="40" rx="8" fill="url(#warm)"/>
  <text x="120" y="395" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Réserver une table</text>

  <!-- Carte / menu simulé -->
  <rect x="420" y="40" width="340" height="380" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(180,83,9,0.2)" stroke-width="1"/>
  <!-- En-tête menu -->
  <rect x="420" y="40" width="340" height="50" rx="12" fill="rgba(180,83,9,0.1)"/>
  <text x="590" y="72" font-family="Georgia, serif" font-size="16" fill="#d97706" text-anchor="middle">Notre Menu</text>

  <!-- Sections menu -->
  <text x="450" y="120" font-family="sans-serif" font-size="10" font-weight="700" fill="#d97706" text-transform="uppercase">ENTRÉES</text>
  <rect x="450" y="128" width="280" height="1" fill="rgba(180,83,9,0.3)"/>
  <rect x="450" y="138" width="160" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="680" y="138" width="40" height="8" rx="4" fill="rgba(217,119,6,0.4)"/>
  <rect x="450" y="154" width="140" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="680" y="154" width="40" height="8" rx="4" fill="rgba(217,119,6,0.3)"/>

  <text x="450" y="190" font-family="sans-serif" font-size="10" font-weight="700" fill="#d97706">PLATS</text>
  <rect x="450" y="198" width="280" height="1" fill="rgba(180,83,9,0.3)"/>
  <rect x="450" y="208" width="170" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="680" y="208" width="40" height="8" rx="4" fill="rgba(217,119,6,0.4)"/>
  <rect x="450" y="224" width="150" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="680" y="224" width="40" height="8" rx="4" fill="rgba(217,119,6,0.3)"/>
  <rect x="450" y="240" width="180" height="8" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="680" y="240" width="40" height="8" rx="4" fill="rgba(217,119,6,0.3)"/>

  <text x="450" y="276" font-family="sans-serif" font-size="10" font-weight="700" fill="#d97706">DESSERTS</text>
  <rect x="450" y="284" width="280" height="1" fill="rgba(180,83,9,0.3)"/>
  <rect x="450" y="294" width="130" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="680" y="294" width="40" height="8" rx="4" fill="rgba(217,119,6,0.4)"/>

  <!-- Badge Google Maps -->
  <rect x="440" y="380" width="140" height="28" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="510" y="399" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">📍 Mulhouse Centre</text>
</svg>
